version: 3

#################################################
#            computational domain               #
#################################################
# Japan Islands region: all 4 main islands + Ryukyu chain
# Grid spacing: ~5 km depth, ~0.2 deg lat/lon
domain:
  min_max_dep: [-5, 700]    # depth in km (negative = above sea level)
  min_max_lat: [24, 46]     # latitude in degree
  min_max_lon: [122, 148]   # longitude in degree
  n_rtp: [142, 111, 131]   # number of nodes in depth, latitude, longitude

#################################################
#            initial model file path            #
#################################################
model:
  init_model_path: japan_model.h5

#################################################
#            parallel computation settings      #
#################################################
parallel:
  n_sims: 1
  ndiv_rtp: [1, 1, 1]

#################################################
#            output file setting                #
#################################################
output_setting:
  output_dir: OUTPUT_FILES
  single_precision_output: false
  output_file_format: 0

#################################################
#          run mode                             #
#################################################
# 0: forward only, 1: inversion
run_mode: 0
