version: 3

#################################################
#            computational domain               #
#################################################
domain:
  min_max_dep: [-5, 75] # depth in km
  min_max_lat: [0, 2]   # latitude in degree
  min_max_lon: [0, 2]   # longitude in degree
  n_rtp: [61, 61, 61]   # benchmark grid sized to amplify SIMD-sensitive sweep work

#################################################
#            traveltime data file path          #
#################################################
source:
  src_rec_file: src_rec_benchmark.dat
  swap_src_rec: false

#################################################
#            initial model file path            #
#################################################
model:
  init_model_path: two_layer_model_benchmark.h5

#################################################
#            parallel computation settings      #
#################################################
parallel:
  n_sims: 1
  ndiv_rtp: [1, 1, 1]
  nproc_sub: 1
  use_gpu: false

############################################
#            output file setting           #
############################################
output_setting:
  output_dir: ./OUTPUT_BENCHMARK/
  output_source_field: false
  output_final_model: false
  output_in_process: false
  output_in_process_data: false
  verbose_output_level: 0
  output_file_format: 1

#################################################
#          forward modeling mode                #
#################################################
run_mode: 0

#################################################
#          solver parameters                    #
#################################################
stencil_order: 1
stencil_type: 0
sweep_type: 1
# Keep the CI benchmark to a short, fixed iteration budget.
conv_tol: 0.0
max_iter: 8

# Benchmark only the base forward solver path.
ignore_velocity_discontinuity: false